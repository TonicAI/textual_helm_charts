# Google SSO Config
# -----------------
#googleClientId: <client-id>
#googleClientSecret: <client-secret>
#googleClientSecretExistingSecret: <secret-name>
#googleClientSecretExistingSecretKey: secret
# -- Optional --
# Must be set to import groups
#googleGroupFilterRegex: <regex-pattern-for-groups>

# Okta SSO Config
# -----------------
#oktaAuthServerId: <customer auth server if you have one>
#oktaClientId: <client-id>
#oktaDomain: <sso-domain>
#oktaIdentityProviderId: <identity-provider-id>
# -- Optional --
# Must be set to import groups
#oktaGroupFilterRegex: <regex-pattern-for-groups>
# Use the Authorization Grant with PKCE flow in Okta. If false (default) it will use the Implicit (hybrid) flow instead
#oktaUsePkceFlow: true

# Github SSO Config
# -----------------
#githubClientId: <client-id>
#githubClientSecret: <client-secret>
#githubClientSecretExistingSecret: <secret-name>
#githubClientSecretExistingSecretKey: secret

# Azure SSO Config
# -----------------
#azureClientId: <client-id>
#azureTenantId: <tenant-id>
#azureClientSecret: <client-secret>
#azureClientSecretExistingSecret: <secret-name>
#azureClientSecretExistingSecretKey: secret
# -- Optional --
# Must be set to import groups
#azureGroupFilterRegex: <regex-pattern-for-groups>

# Keycloak SSO Config
# -----------------
#keycloakClientId: <client-id>
#keycloakClientSecret: <client-secret>
#keycloakClientSecretExistingSecret: <secret-name>
#keycloakClientSecretExistingSecretKey: secret
#keycloakAuthority: <authority-url>
# -- Optional --
# Must be set to import groups
#keycloakGroupFilterRegex: <regex-pattern-for-groups>

# OIDC SSO Config
# -----------------
#oidcAuthority: <oidc-authority-url>
#oidcClientId: <oidc-client-id>
#oidcClientSecret: <oidc-client-secret>
# -- Optional --
# The space-delimited list of scopes to request from the OIDC SSO provider. Defaults to "openid profile email". If necessary, include a scope that corresponds to groups.
#oidcScopes: <oidc-scopes>
#oidcEmailClaimName: <email-claim-name>
#oidcFirstNameClaimName: <first-name-claim-name>
#oidcLastNameClaimName: <last-name-claim-name>
#oidcGroupsClaimName: <groups-claim-name>
# Must be set to import groups
#oidcGroupFilterRegex: <regex-pattern-for-groups>

# Custom CA Configuration
# -----------------
# Trust customer-supplied CA certificates for outbound HTTPS calls made from the api-server and worker pods.
# Create a ConfigMap in the release namespace whose keys are CA certificate files and reference it here.
# The certs are loaded into the pod's trust store at startup; rotating the ConfigMap requires a pod restart.
#
# Supported file extensions: .crt, .pem, .cer, .der, .ca-bundle (case-insensitive). Both PEM (text) and DER
# (binary) encodings are auto-detected. PEM bundles containing multiple certs (e.g. root + intermediates) are
# loaded in full. ConfigMap keys WITHOUT one of these extensions are silently ignored — make sure to name keys
# accordingly when creating the ConfigMap, e.g.:
#   kubectl create configmap textual-custom-ca --from-file=corp-root.crt=./corp-root.crt -n <release-namespace>
#
# SOLAR_CUSTOM_CA_PATH also accepts a single certificate file (any extension), so operators who
# manage their own volume/mount can set customCa.enabled=false and inject SOLAR_CUSTOM_CA_PATH directly via
# textual_api_server.env / textual_worker.env, pointing at either a directory or a specific bundle file.
customCa:
  enabled: false
  # Name of a ConfigMap in the release namespace. Each key in the ConfigMap is a certificate file mounted
  # at the path below. Required when customCa.enabled is true.
  configMapName: ""
  # Path inside the pod where the certs are mounted and read from. The chart drives both the volumeMount
  # and the SOLAR_CUSTOM_CA_PATH env var from this single value, so override here if you need a different path.
  mountPath: /etc/tonic/textual/trusted-ca-certs

# Deployment Strategy: This can be set to either "RollingUpdate" or "Recreate". If not provided, the default value
# is "Recreate". "RollingUpdate" will perform a rolling update of the deployment similar to a blue/green
# deployment and thus requires additional resources as both old and new versions will be running simultaneously
# for several minutes. Solar will be available during this time, but behavior may be unpredictable depending on
# differences in the running an new versions. "Recreate" means that the current deployment will be deleted and a
# new one created. This will result in Solar being down during an update.
deployStrategy: Recreate

# Lucene Index Shared Storage Configuration
# Enable this for multi-pod deployments where API and Worker pods need to share the Lucene text search index.
# When disabled (default), each pod uses an emptyDir volume which is not shared and is wiped on pod restart.
# Requires a storage class that supports ReadWriteMany (RWX) access mode (e.g., NFS, Azure Files, AWS EFS).
luceneIndex:
  enabled: false
  # storageClassName: ""  # Optional: specify a storage class name, uses cluster default if not set
  size: 10Gi

# Custom Models Shared Storage Configuration
# Enable this so imported entity LoRA adapters (Custom Entity Library import feature) survive pod
# restarts and are visible to BOTH the textual-roberta and textual-ml deployments, which mount the
# same /usr/bin/textual/custom_models path. Without this, imported adapters live in an emptyDir and
# disappear on any pod recycle, breaking subsequent training/inference runs against custom entities.
# Who needs it: anyone using the Custom Entity Library import feature on a multi-pod k8s install.
# Requires a storage class that supports ReadWriteMany (RWX) access mode (e.g., NFS, Azure Files,
# AWS EFS), because both deployments mount the same claim concurrently.
customModels:
  enabled: false
  # storageClassName: ""  # Optional: specify a storage class name, uses cluster default if not set
  size: 100Mi
