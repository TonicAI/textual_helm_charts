environmentName: <company-name>

# You can set this to a specific Solar version number if you wish to ensure you always get the same version. Otherwise you will always deploy the latest version of Solar.
textualVersion: "<version-number>"

solarLicense: <license>
# Option B: reference an existing K8s Secret
# solarLicenseExistingSecret: <secret-name>
# solarLicenseExistingSecretKey: secret  # key within the secret, defaults to "secret"
textualEncryptionSecret: <encryption-key>
# Option B: reference an existing K8s Secret
# textualEncryptionSecretExistingSecret: <secret-name>
# textualEncryptionSecretExistingSecretKey: secret  # key within the secret, defaults to "secret"
asr:
  create: false

# textualDatabase is the postgres database that will hold information about your workspace.
textualDatabase:
  host: <db-host>
  port: 5432
  dbName: textual
  user: <user>
  # Option A: provide the password directly - leave blank to use existing k8 secret
  password: <password>
  # Option B: reference an existing K8s Secret (e.g. synced from AWS Secrets Manager via CSI driver)
  # existingSecret: <secret-name>
  # existingSecretKey: password   # key within the secret, defaults to "password"
  sslMode: Require
  ## Optional, if you want to customize the schema name used (defaults to "public")
  # schema: public

# Optional analytics runtime settings. Release images do not contain analytics
# secrets; set these values, or reference existing Kubernetes Secrets, when the
# deployment should send Amplitude events.
amplitudeApiKey: ""
# amplitudeApiKeyExistingSecret: <secret-name>
# amplitudeApiKeyExistingSecretKey: secret
analyticBackendSalt: ""
# analyticBackendSaltExistingSecret: <secret-name>
# analyticBackendSaltExistingSecretKey: secret

# Optional Labels to add to all resources - if there is a conflict we use allLabels
# allLabels: {
#   "owner": "example"
# }
# Optional Annotations to add to all resources
# allAnnotations: {
#   "maintainer": "example.com",
#   "environment": "test"
# }

textual_api_server:
  env: {}
  nodeSelector: {}
  tolerations:
    []
    # - key: "foo"
    #   operator: "Exists"
    #   effect: "NoSchedule"
  # annotations to apply to the service that routes traffic to the web server
  #annotations: {}
  # By default this chart will create an internal load balancer service on
  # EKS and AKS; however, providing additional annotations will disable this
  # If additional annotations are applied and you need a load balancer to
  # the Tonic installation see documentation from your cloud provider
  # AWS: https://docs.aws.amazon.com/eks/latest/userguide/network-load-balancing.html
  #      https://kubernetes-sigs.github.io/aws-load-balancer-controller/v2.5/
  # Azure: https://learn.microsoft.com/en-us/azure/aks/internal-lb
  # GCP: https://cloud.google.com/kubernetes-engine/docs/concepts/service-load-balancer
  ports:
    httpsOnly: true
    https: 443
    http: 80
  # supported values are LoadBalancer, ClusterIP and NodePort. LoadBalancer is
  # the default if this isn't provided
  service_type: "LoadBalancer"
  # volumes:
  # volumeMounts:
textual_worker:
  # numberOfWorkers will determine how many worker containers are deployed when installing the helm chart.
  numberOfWorkers: 1
  env: {}
  nodeSelector: {}
  tolerations:
    []
    # - key: "foo"
    #   operator: "Exists"
    #   effect: "NoSchedule"
  # volumes:
  # volumeMounts:
textual_ml:
  # useGPU will determine if the ML container will use a GPU or not. If not provided, the default value is false
  useGpu: false
  # numberOfMlWorkers will determine how many ML containers are deployed when installing the helm chart. If using GPU, we recommend one per GPU
  numberOfMlWorkers: 1
  # textualMlParallelism will determine how many ML worker processes are deployed per ML container. For GPUs, we recommend 1 process per 5GB of VRAM
  textualMlParallelism: 1
  env: {}
  nodeSelector: {}
  tolerations:
    []
    # - key: "foo"
    #   operator: "Exists"
    #   effect: "NoSchedule"
textual_roberta:
  # useGPU will determine if the ML container will use a GPU or not. If not provided, the default value is false
  useGpu: false
  env: {}
  nodeSelector: {}
  tolerations:
    []
    # - key: "foo"
    #   operator: "Exists"
  #   effect: "NoSchedule"
textual_asr:
  env: {}
  nodeSelector: {}
  tolerations:
    []
    # - key: "foo"
    #   operator: "Exists"
  #   effect: "NoSchedule"

ingress:
  enabled: false
  class: nginx
  host: null
  labels: {}
#  tls:
#    - hosts:
#        - <textual-url>
#      secretName: <secret-name>
# By default this chart will create an nginx ingress, however providing
# additional annotations will disable this
#  annotations: {}

# This value will be provided to you by Solar and will allow you to authenticate against our private docker repository.
dockerConfigAuth: <docker-config-auth>

# Service account for textual
serviceAccount:
  create: true
  annotations: {}
  name: textual

solarStatisticsSeed: <any-integer>

